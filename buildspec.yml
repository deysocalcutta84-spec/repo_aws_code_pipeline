version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...

  pre_build:
    commands:
      - echo Pre-build phase started
      - echo Build started on `date`

  build:
    commands:
      - echo Build phase started
      - echo Copying files to output...

  post_build:
    commands:
      - echo Build completed successfully!

artifacts:
  files:
    - '**/*'
  discard-paths: no
